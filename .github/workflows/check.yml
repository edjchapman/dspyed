name: check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        # --group analysis: matplotlib must resolve for pyright over eval/report.py
        run: uv sync --frozen --group analysis
      - name: Run make check
        run: make check
